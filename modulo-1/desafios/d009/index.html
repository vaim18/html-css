<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="imagens/favicon.ico" type="image/x-icon">
    <title>Meus Vídeos</title>
    
    <style>
    /* Container principal precisa ser relativo */
    .video-container {
        position: relative;
        width: 560px; /* Largura do vídeo */
        height: 315px; /* Altura do vídeo */
        cursor: pointer;
    }

    /* Iframe fica atrás */
    .video-container iframe {
        width: 100%;
        height: 100%;
        pointer-events: none; /* Ignora cliques para o iframe */
    }

    /* Div invisível que recebe o clique */
    .click-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0,0,0,0); /* Transparente */
        z-index: 10; /* Fica acima do iframe */
    }
    </style>
    
</head>
<body>
