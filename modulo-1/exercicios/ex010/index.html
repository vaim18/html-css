<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabalhando com links</title>
</head>
<body>
    <h1>Usando links externos</h1>
    <p>Você pode acessar os vídeos em 
        <a 
            href="https://www.youtube.com/@vaimsoares3364">YouTube
        </a>
    </p>
        <p>Você pode acessar os vídeos em 
        <a 
            href="https://www.youtube.com/@vaimsoares3364" target="_blank" rel="external">YouTube<!-- target="_blank" rel="external" para abrir em uma nova aba -->
        </a>
    </p>
    <h2>Usando links internos</h2>
    <p>Você pode acessar a seção de vídeos do meu site clicando 
        <a href="pag002.html" target="_self" rel="next">aqui</a>.
    </p>
    <p>Você pode acessar a página de notícias clicando 
        <a href="noticias/pag003.html" target="_self" rel="next">aqui</a>.
    </p>
</body>
</html>
